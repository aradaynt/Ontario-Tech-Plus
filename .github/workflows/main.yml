name: Build Flutter App

on:
  push:
    branches: [ main ] # Runs every time you push to the 'main' branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get your code from GitHub
      - uses: actions/checkout@v4

      # 2. Setup Java (needed for Android)
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. GET DEPENDENCIES
      - run: flutter pub get

      # 5. CREATE THE .ENV FILE (This is the part you need!)
      - name: Create ...env file
        run: echo "MY_PRIVATE_KEY=${{ secrets.MY_PRIVATE_KEY }}" > ...env

      # 6. BUILD THE APP
      - run: flutter build apk --release